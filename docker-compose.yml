services:
  db:
    image: mysql:8.0
    container_name: busplanen-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: busplanen
      MYSQL_USER: bususer
      MYSQL_PASSWORD: buspassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: